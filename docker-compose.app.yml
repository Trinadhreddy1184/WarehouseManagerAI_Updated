services:
  app:
    build: .
    environment:
      - DATA_BACKEND=postgres
      - DATABASE_URL=postgresql://app:app_pw@db:5432/warehouse
    depends_on:
      - db
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_pw
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_seed:/docker-entrypoint-initdb.d:ro
volumes:
  db_data:
