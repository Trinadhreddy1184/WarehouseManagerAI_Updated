services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wm_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - db_data:/var/lib/postgresql/data

  fetcher:
    image: amazon/aws-cli:2.15.33
    container_name: wm_fetcher
    restart: "no"
    environment:
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_KEY: ${S3_KEY}
      S3_PRESIGNED_URL: ${S3_PRESIGNED_URL:-}
    volumes:
      - seed_data:/seed
    entrypoint: ["/bin/sh","-lc"]
    command: |
      set -e
      if [ -n "$S3_PRESIGNED_URL" ]; then
        echo "Downloading presigned URL -> /seed/100_dump.sql"
        curl -fsSL "$S3_PRESIGNED_URL" -o /seed/100_dump.sql
      else
        echo "Downloading s3://${S3_BUCKET}/${S3_KEY} -> /seed/100_dump.sql"
        aws s3 cp "s3://${S3_BUCKET}/${S3_KEY}" /seed/100_dump.sql --region "$AWS_REGION"
      fi
      ls -lah /seed
      echo "OK: dump downloaded."

  loader:
    image: postgres:16
    container_name: wm_loader
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - seed_data:/seed
      - ./views:/views:ro
    entrypoint: ["/bin/bash","-lc"]
    command: |
      set -e
      echo "Waiting for DB..."
      until pg_isready -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 1; done
      echo "Waiting for /seed/100_dump.sql..."
      until [ -s /seed/100_dump.sql ]; do sleep 1; done
      echo "Ensuring pgvector..."
      psql -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
      echo "Loading dump..."
      psql -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /seed/100_dump.sql
      echo "Applying app_* views..."
      psql -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /views/999_app_views.sql
      echo "Loader complete."

  app:
    build: .
    container_name: wm_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LLM_CONFIG_PATH: ${LLM_CONFIG_PATH}
      DATABASE_CONFIG_PATH: ${DATABASE_CONFIG_PATH}
      EMBEDDINGS_CONFIG_PATH: ${EMBEDDINGS_CONFIG_PATH}
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    ports:
      - "8501:8501"
    command: ["bash","-lc","streamlit run ui/streamlit_ui.py --server.port=8501 --server.address=0.0.0.0"]

volumes:
  db_data:
  seed_data:
